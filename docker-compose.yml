services:
  postgres:
    image: postgres:16-alpine
    container_name: doublehq-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: doublehq
      POSTGRES_PASSWORD: doublehq_dev
      POSTGRES_DB: doublehq_copilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doublehq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
